[project]
name = "adk-skill-stream-ui"
version = "0.1.0"
description = "Agent platform with core runtime, workspace discovery, and React UI."
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.30.0",
  "google-adk>=1.18.0",
  "litellm>=1.0.0",
  "python-dotenv>=1.0.1",
  "python-multipart>=0.0.9",
  "poethepoet>=0.32.0",
  "pytest>=8.3.5",
  "coverage>=7.6.0",
  "ruff>=0.6.0",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
py-modules = ["api", "server"]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["core*", "workspace*", "services*"]
exclude = ["frontend*", "tests*"]
namespaces = true

[tool.poe.tasks]
backend = "uvicorn server:app --app-dir src --reload --reload-dir src --reload-dir tests --reload-dir scripts --reload-include '*.py' --reload-exclude 'frontend/*' --reload-exclude '.venv/*' --reload-exclude '*/.venv/*' --reload-exclude 'venv/*' --reload-exclude '*/venv/*' --reload-exclude '*site-packages/*' --reload-exclude '__pycache__/*' --host 127.0.0.1 --port 8000"
frontend-install = "npm --prefix frontend install"
frontend = "npm --prefix frontend run dev -- --host 127.0.0.1 --port 3000"
install-tests-ext = "uv run python scripts/install_related_tests_extension.py"
new-agent = "uv run python scripts/create_agent_scaffold.py"
format = "ruff format ."
test = "uv run python -m pytest"
stop = "uv run python scripts/dev_supervisor.py stop"
dev = "uv run python scripts/dev_supervisor.py run"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = ["--import-mode=importlib"]
